version: "3.9"

# Production overrides — use with:
#   docker-compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d

services:

  backend:
    environment:
      - DEBUG=false
      - LOG_LEVEL=WARNING
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 5

  frontend:
    environment:
      - DEBUG=false

  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
