# ai-prompt-platform global settings
# Values here are DEFAULTS — override via environment variables or .env

app:
  name: "AI Prompt Platform"
  version: "1.0.0"
  debug: false

api:
  host: "0.0.0.0"
  port: 8000
  prefix: "/api/v1"
  cors_origins:
    - "http://localhost:8501"
    - "http://127.0.0.1:8501"

storage:
  base: "storage"
  upload_dir: "storage/uploads"
  results_dir: "storage/results"
  max_upload_mb: 100

ai:
  openai:
    default_model: "gpt-4o"
    max_tokens: 4096
    temperature: 0.2
  gemini:
    default_model: "gemini-1.5-pro"
    max_tokens: 4096
    temperature: 0.2
  ollama:
    base_url: "http://localhost:11434"
    default_model: "llama3"

remote:
  gpu:
    enabled: false
    api_url: ""
  spark:
    enabled: false
    master_url: ""

logging:
  level: "INFO"
  format: "json"
  file: "logs/app.log"
